<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments"></ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
          id="name-input"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
          id="text-input"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";
    const name = document.getElementById("name-input");
    const text = document.getElementById("text-input");

    const sanitizeHtml = (value) => {
      return value.replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    const comments =[
      {
        name: "Глеб Фокин",
        date: new Date("2022-02-12 12:18"),
        text: "Это будет первый комментарий на этой странице",
        likes: 3,
        isLiked: false
      },
      {
        name: "Варвара Н.",
        date: new Date("2022-02-13 19:22"),
        text: "Мне нравится как оформлена эта страница! ❤",
        likes: 75,
        isLiked: true
      }
    ]

    const initNewComment = () => {
      const addButton = document.querySelector(".add-form-button");
      
      addButton.addEventListener('click', () => {
        const newComment = {
          name: sanitizeHtml(name.value),
          date: new Date(),
          text: sanitizeHtml(text.value),
          likes: 0,
          isLiked: false
        };
          
        if (name.value.trim() === "" || text.value.trim() === "") {
          return alert("Пожалуйста, заполните все поля формы!")
        } else {
          comments.push(newComment);

          renderComments();

          name.value = "";
          text.value = "";
        }
      })
    }

    const renderComments = () => {
      const list = document.querySelector('.comments');

      list.innerHTML = comments.map((comment, index) => {
        return `
        <li class="comment" data-index="${index}">
          <div class="comment-header">
            <div>${comment.name}</div>
            <div>${comment.date.toLocaleString()}</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">${comment.text}</div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">${comment.likes}</span>
              <button data-index="${index}" class="like-button ${comment.isLiked ? "-active-like" : ""}"></button>
            </div>
          </div>
        </li>
        `;
      }).join("");
      
      const likeButtons = document.querySelectorAll(".like-button");

      for(const likeButton of likeButtons) {
        likeButton.addEventListener('click', (event) => {
          event.stopPropagation();

          const index = likeButton.dataset.index;
          const comment = comments[index];

          if (comment.isLiked) {
            comment.likes -= 1;
          } else {
            comment.likes += 1;
          }

          comment.isLiked = !comment.isLiked;

          const likesContainer = likeButton.closest('.likes');
          const counterElement = likesContainer.querySelector('.likes-counter');

          counterElement.textContent = comment.likes;
          likeButton.classList.toggle('-active-like', comment.isLiked);
        })
      }

      const commentsElements = document.querySelectorAll(".comment");

      for (const commentElement of commentsElements) {
        commentElement.addEventListener('click', () => {
          const currentComment = comments[commentElement.dataset.index];

          text.value = `> ${currentComment.text} >\n ${currentComment.name},`;
          text.focus();
        })
      }
    }

    renderComments();
    initNewComment();
    
  

  </script>
</html>
