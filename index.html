<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";
    const nameEl = document.querySelector('.add-form-name');
    const textEl = document.querySelector('.add-form-text');
    const btnEl = document.querySelector('.add-form-button');
    const commentsEl = document.querySelector('.comments');
// Добавляем комментарий
    btnEl.addEventListener('click', () => {
      if (nameEl.value === "" || textEl.value === "") {
        return;
    }

      const newComment = 
      `<div class="comment">
          <div class="comment-header">
            <div>${nameEl.value}</div>
            <div>${new Date().toLocaleString()}</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">${textEl.value}</div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">0</span>
              <button class="like-button"></button>
            </div>
          </div>
        </div>`;

        commentsEl.innerHTML += newComment;
        nameEl.value = ""; 
        textEl.value = "";
    })
// Добавляем/убираем лайк
    commentsEl.addEventListener('click', () => {
      if (event.target.classList.contains('like-button')) {
        const likeButton = event.target;
        const counterEl = likeButton.closest('.likes').querySelector('.likes-counter');
        let currentCount = Number(counterEl.innerHTML);
        
        if (likeButton.classList.contains('-active-like')) {
          currentCount--;
          likeButton.classList.remove('-active-like');
        } else {
          currentCount++;
          likeButton.classList.add('-active-like');
        }
      counterEl.innerHTML = currentCount;
      }
    });
  </script>
</html>
